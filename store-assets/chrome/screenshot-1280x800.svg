  <text x="154" y="163" fill="#172b3a" font-family="Arial, sans-serif" font-size="38" font-weight="700">Gimme Sum Headers!</text>
  <text x="154" y="205" fill="#476277" font-family="Arial, sans-serif" font-size="20">Create a reusable header set, then map it to only the HTTPS sites you choose.</text>
  <text x="154" y="235" fill="#476277" font-family="Arial, sans-serif" font-size="20">Exact hosts override wildcard defaults.</text>
