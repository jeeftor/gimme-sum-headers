name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - run: make check
      - run: make package
      - run: make firefox-package
      - run: make firefox-lint
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: make browser-smoke
