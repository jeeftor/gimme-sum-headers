name: Delete AMO add-on

on:
  workflow_dispatch:
    inputs:
      addon_guid:
        description: AMO add-on GUID to permanently delete
        required: true
        type: string

permissions: {}

jobs:
  delete:
    runs-on: ubuntu-latest
    environment: extension-signing
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Permanently delete the AMO add-on
        env:
          ADDON_GUID: ${{ inputs.addon_guid }}
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          node <<'NODE'
          const crypto = require("node:crypto");

          const issuer = process.env.AMO_JWT_ISSUER;
          const secret = process.env.AMO_JWT_SECRET;
          const addonGuid = process.env.ADDON_GUID;
          if (!issuer || !secret || !addonGuid) {
            throw new Error("AMO credentials and an add-on GUID are required.");
          }

          const issuedAt = Math.floor(Date.now() / 1000);
          const encode = (value) => Buffer.from(JSON.stringify(value)).toString("base64url");
          const signingInput = `${encode({ alg: "HS256", typ: "JWT" })}.${encode({
            iss: issuer,
            jti: crypto.randomUUID(),
            iat: issuedAt,
            exp: issuedAt + 60,
          })}`;
          const token = `${signingInput}.${crypto.createHmac("sha256", secret).update(signingInput).digest("base64url")}`;
          const headers = { Authorization: `JWT ${token}` };
          const endpoint = `https://addons.mozilla.org/api/v5/addons/addon/${encodeURIComponent(addonGuid)}`;

          const confirmationResponse = await fetch(`${endpoint}/delete_confirm/`, { headers });
          if (!confirmationResponse.ok) {
            throw new Error(`AMO deletion confirmation failed with HTTP ${confirmationResponse.status}.`);
          }

          const { delete_confirm: deleteConfirm } = await confirmationResponse.json();
          if (!deleteConfirm) {
            throw new Error("AMO did not return a deletion confirmation token.");
          }

          const deletionResponse = await fetch(`${endpoint}/?delete_confirm=${encodeURIComponent(deleteConfirm)}`, {
            method: "DELETE",
            headers,
          });
          if (!deletionResponse.ok) {
            throw new Error(`AMO deletion failed with HTTP ${deletionResponse.status}.`);
          }

          console.log("AMO add-on permanently deleted.");
          NODE
