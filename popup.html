<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gimme Sum Headers!</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <p class="eyebrow">Header status</p>
      <h1>This site</h1>
      <p id="host" class="host">Checking this tab…</p>
      <p id="connection-state" class="connection-state" data-state="unknown">Checking mapping…</p>
      <p id="effective" class="effective"></p>
      <label for="header-set">Header set for this exact hostname</label>
      <select id="header-set" disabled></select>
      <div class="actions">
        <button id="apply" type="button" disabled>Save exact mapping</button>
        <button id="remove" type="button" class="secondary" hidden>Remove exact override</button>
      </div>
      <p id="status" role="status" aria-live="polite"></p>
      <a id="settings" href="#">Manage header sets</a>
    </main>
    <script src="rules.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
